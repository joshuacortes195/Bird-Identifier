# Netlify config for the frontend (Phase 11). GitHub auto-deploy.
# Set VITE_API_BASE_URL in the Netlify site's environment (per deploy context) to the
# deployed HTTPS API URL. Lock the API's WILDLIFE_CORS_ORIGINS to this site's origin.

[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# SPA fallback so client routes resolve to index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
